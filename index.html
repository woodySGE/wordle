<!DOCTYPE html>
<html>
    <body align = "center">

    <h1>Wordle</h1>    
    <p>Choose the word edition.</p>
    <button onclick="window.location.href = 'choice.html';">Play</button>
    <script>
        window.onload = function() {
            if (localStorage.getItem('chosenword')) {
              localStorage.removeItem('chosenword');
              location.reload();
            }
        }
    </script>
   </body>
</html>
