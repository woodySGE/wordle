<html>
    <head>
            <link rel="stylesheet" href="css/center.css">
            <link rel="stylesheet" href="css/body.css">
            <link rel="stylesheet" href="css/indexbutton.css">
            <link rel="stylesheet" href="css/chooseword.css">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
    </head>
    <body class="center">

<h2 style="font-size:3vw; margin-top: -25px"; class="center-form">Word Insert</h2><br>


<style>
.center-form {
    width: fit-content;
    margin: 0 auto;
    text-align: center;
}
</style>

<form onsubmit="storeWord(event)" class="center-form">
    <input class="chooseword" type="text" id="chosenword" name="chosenword"><br><br>
    <input class="indexbutton"style="font-size:vw" type="submit" value="Submit">
</form>

<script>
function storeWord(event) {
    event.preventDefault();

    var cword = document.getElementById('chosenword').value;

    if (cword.length == 5) {
        sessionStorage.setItem('chosenword', cword);

        window.location.href = "game.html";
    } else {
        alert("pick one with 5 leters :D")
    }


}
</script>
</body>
</html>
