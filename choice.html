<html>
    <body>
<h1>Word Insert</h1>
<style>
.center-form {
    width: fit-content;
    margin: 0 auto;
    text-align: center;
}
</style>

<form onsubmit="storeWord(event)" class="center-form">
    <input type="text" id="chosenword" name="chosenword"><br><br>
    <input type="submit" value="Submit">
</form>

<script>
function storeWord(event) {
    event.preventDefault();

    var cword = document.getElementById('chosenword').value;
    sessionStorage.setItem('chosenword', cword);

    window.location.href = "/wordle/game.html";
}
</script>
</body>
</html>
