<html>
    <body>
        <head>
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
        </head>
<h1 style="font-size:3vw" class="center-form">Word Insert</h1>


<style>
.center-form {
    width: fit-content;
    margin: 0 auto;
    text-align: center;
}
</style>

<form onsubmit="storeWord(event)" class="center-form">
    <input style="font-size:1vw" type="text" id="chosenword" name="chosenword"><br><br>
    <input style="font-size:1vw" type="submit" value="Submit">
</form>

<script>
function storeWord(event) {
    event.preventDefault();

    var cword = document.getElementById('chosenword').value;
    sessionStorage.setItem('chosenword', cword);

    window.location.href = "/wordle/game.html";
}
</script>
</body>
</html>
