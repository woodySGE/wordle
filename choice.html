<!DOCTYPE html>
<html>
    <body align = "center">
    <h1>Word Insert</h1>
    <script>
        function storeWord() {
            var cword = document.getElementById('chosenword').value;
            sessionStorage.setItem('chosenword', cword);
        }
    </script>
    <form action="/wordle/game.html">
        <input type="text" id="chosenword" name="chosenword"><br><br>
        <input type="submit" value="Submit" id="submitbtn" onclick="storeWord()">
    </form> 
    </body>
</html>
