<form onsubmit="storeWord(event)">
    <input type="text" id="chosenword" name="chosenword"><br><br>
    <input type="submit" value="Submit">
</form>

<script>
function storeWord(event) {
    event.preventDefault();

    var cword = document.getElementById('chosenword').value;
    sessionStorage.setItem('chosenword', cword);

    window.location.href = "/wordle/game.html";
}
</script>
