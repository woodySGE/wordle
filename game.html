    <script>
        var Row = 1;
        var Column = 0;
        var cword;
        var Completed = false;
        var Failed = false;

        window.onload = function() {
            let cwordOG = sessionStorage.getItem('chosenword')
            if (cwordOG == undefined) {
                alert("WORD MISSING PLEASE RELOAD")
                window.location.href = "choice.html";
            } else {
                cword = cwordOG.toUpperCase();
            }
        };

        document.addEventListener('keydown', function(event) {
            if (Completed != true) {
                if (Failed != true) {
                    [Row, Column, Completed, Failed] = mainevent(event, Row, Column, Completed)
                }
            }
            if (Completed == true) {
                const Timeout = setTimeout(Winner, 3000);
            }

            if (Failed == true) {
                document.getElementById(`wordinvalid`).innerHTML = `${cword}`
                document.getElementById(`wordinvalid`).style.fontSize = 22
                document.getElementById(`wordinvalid`).style.letterSpacing = 1
                document.getElementById(`wordinvalid`).style.width = 94
                document.getElementById(`wordinvalid`).style.visibility = "visible"
                const Timeout1 = setTimeout(Loser, 3000);
            }
        })
