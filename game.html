    <body>
        
        <script>
            var Row = 1;
            var Column = 1;
        window.onload = function() {
            let cword = sessionStorage.getItem('chosenword');
            if (cword == null) {
                alert("WORD MISSING PLEASE RELOAD")
                window.location.href = "choice.html";
            }
        };

        document.addEventListener('keydown', function(event) {
            console.log(Row)
            console.log(Column)
            console.log("_____")
            if (event.key.match(/^[A-Za-z]$/)) {
                document.getElementById(`R${Row}C${Column}`).innerHTML = `${event.key.toUpperCase()}`;
                console.log(event.key)
                if (Column != 5) {
                    console.log("added")
                    Column += 1
                } 
                


                
            }

            if (event.keyCode == 8) {
                if (Column != 1) {
                    document.getElementById(`R${Row}C${Column}`).innerHTML = ``
                    Column--;
                } else {
                    document.getElementById(`R${Row}C${Column}`).innerHTML = ``
                }
            }


            if (event.key === "Enter") {
                if (Column == 5) {
                    if (Row != 6) {
                        console.log("Done")
                        Row += 1
                        Column = 1
                    }
                }
            }
        })
        </script>
